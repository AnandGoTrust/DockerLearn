# ============================================================================
# 🚀 PRODUCTION ENVIRONMENT (COMMENT OUT ABOVE SECTION BEFORE USING THIS)
# Uses pre-built image from Docker Hub (pushed by CI/CD pipeline).
# Command: docker compose up
# ============================================================================
services:
  postgres:
    image: postgres:15
    container_name: node-postgres-prod
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  app:
    # DOCKER HUB IMAGE - Pulled from Docker Hub
    # Updated automatically by CI/CD on every push to main branch
    image: anandgotrust/node-backend:latest
    container_name: node-app-prod
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

# ============================================================================
# PERSISTENT DATA VOLUMES (Shared for both Development & Production)
# ============================================================================
volumes:
  postgres_data:
    driver: local

# ============================================================================
# CUSTOM NETWORK (Shared for both Development & Production)
# Bridge network for inter-container communication
# Allows app to connect to postgres using hostname 'postgres'
# ============================================================================
networks:
  app-network:
    driver: bridge